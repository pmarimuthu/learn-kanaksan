<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2f6fd0"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="g2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#2f6fd0"/>
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="32" cy="32" r="31" fill="#0f172a"/>

  <!-- Orbit 1 — horizontal ellipse -->
  <ellipse cx="32" cy="32" rx="26" ry="9"
           fill="none" stroke="url(#g1)" stroke-width="1.8" opacity="0.9"/>

  <!-- Orbit 2 — rotated 60° -->
  <ellipse cx="32" cy="32" rx="26" ry="9"
           fill="none" stroke="url(#g2)" stroke-width="1.8" opacity="0.9"
           transform="rotate(60 32 32)"/>

  <!-- Orbit 3 — rotated 120° -->
  <ellipse cx="32" cy="32" rx="26" ry="9"
           fill="none" stroke="url(#g1)" stroke-width="1.8" opacity="0.9"
           transform="rotate(120 32 32)"/>

  <!-- Nucleus -->
  <circle cx="32" cy="32" r="5" fill="url(#g1)"/>
  <circle cx="32" cy="32" r="3" fill="#ffffff" opacity="0.9"/>

  <!-- Electron dots -->
  <circle cx="58" cy="32" r="2.5" fill="#06b6d4"/>
  <circle cx="19" cy="10.5" r="2.5" fill="#7c3aed"/>
  <circle cx="19" cy="53.5" r="2.5" fill="#2f6fd0"/>
</svg>
